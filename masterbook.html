<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ร้านหนังสือ</title>
<link rel="stylesheet" href="testproject.css">
<link rel="stylesheet" href="omi.js">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* 🔹 Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.menu-btn {
  font-size: 24px;
  cursor: pointer;
}

/* 🔹 Sidebar */
.sidebar {
  position: fixed;
  top: 0;
  left: -260px;
  width: 260px;
  height: 100%;
  background: white;
  box-shadow: 2px 0 5px rgba(0,0,0,0.2);
  transition: 0.3s;
  z-index: 1000;
  padding: 20px;
}

.sidebar.active {
  left: 0;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.login {
  background: #4da6ff;
  color: white;
}

.register {
  background: #e0f0ff;
}

/* 🔹 พื้นหลังมืด */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  display: none;
  z-index: 900;
}

.overlay.active {
  display: block;
}

/* 🔹 Content */
.content {
  padding: 15px;
}

.title {
  font-size: 18px;
  margin-bottom: 10px;
}

/* 🔹 หนังสือ */
.book-list {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.book {
  background: white;
  min-width: 140px;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.book img {
  width: 100%;
  border-radius: 5px;
}

.price {
  color: black;
  font-weight: bold;
}

.old {
  text-decoration: line-through;
  color: gray;
  font-size: 12px;
}

.btn {
  margin-top: 5px;
  padding: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.read {
  background: #dff3ff;
}

.cart {
  background: #4da6ff;
  color: white;
}
</style>
</head>

<body>

<!-- 🔹 Header -->
<div class="header">
  <div>📚 BOOK STORE</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- 🔹 Sidebar -->
<div class="sidebar" id="sidebar">
  <button class="login">เข้าสู่ระบบ</button>
  <button class="register">สมัครสมาชิก</button>

  <hr>

  <p>หมวดหมู่</p>
  <p>มาใหม่</p>
  <p>อันดับขายดี</p>
  <p>โปรโมชั่น</p>
</div>

<!-- 🔹 Overlay -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- 🔹 Content -->
<div class="content">
  <div class="title">มาใหม่ ลดสูงสุด 30%</div>

  <div class="book-list">

    <div class="book">
      <img src="https://via.placeholder.com/150">
      <p>หนังสือ A</p>
      <p class="old">฿169</p>
      <p class="price">฿152</p>
      <button class="btn read">ทดลองอ่าน</button>
      <button class="btn cart">🛒</button>
    </div>

    <div class="book">
      <img src="https://via.placeholder.com/150">
      <p>หนังสือ B</p>
      <p class="old">฿159</p>
      <p class="price">฿143</p>
      <button class="btn read">ทดลองอ่าน</button>
      <button class="btn cart">🛒</button>
    </div>

    <div class="book">
      <img src="https://via.placeholder.com/150">
      <p>หนังสือ C</p>
      <p class="old">฿159</p>
      <p class="price">฿143</p>
      <button class="btn read">ทดลองอ่าน</button>
      <button class="btn cart">🛒</button>
    </div>

  </div>
</div>

<!-- 🔹 JavaScript -->
<script>
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
</script>

</body>
</html>
